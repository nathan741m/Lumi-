<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiplan Real</title>

<style>
body {
  margin:0;
  background:#fff;
  font-family:Arial;
  overflow:hidden;
}

/* Heure */
#time {
  position:absolute;
  top:10px;
  right:20px;
  font-size:22px;
  font-weight:bold;
}

/* Boutons lignes */
#lineButtons {
  position:absolute;
  top:10px;
  left:10px;
}
#lineButtons button {
  background:#d32f2f;
  color:white;
  border:none;
  margin:3px;
  padding:6px 12px;
}

/* Ligne principale */
#lineContainer {
  position:absolute;
  top:140px;
  width:100%;
  text-align:center;
}

/* Ligne rouge */
#lineBar {
  height:6px;
  background:#d32f2f;
  margin:0 40px;
  position:relative;
}

/* Stops */
#stops {
  position:relative;
  display:flex;
  justify-content:space-between;
  margin:0 40px;
  margin-top:-10px;
}

.stop {
  text-align:center;
}

/* Point */
.dot {
  width:18px;
  height:18px;
  background:black;
  border-radius:50%;
  margin:auto;
}

/* Actif */
.active .dot {
  background:#d32f2f;
}

/* Nom */
.stopName {
  margin-top:8px;
  font-size:14px;
  white-space:nowrap;
}

/* Défilement */
#bottom {
  position:absolute;
  bottom:0;
  width:100%;
  height:80px;
  overflow:hidden;
  border-top:4px solid #d32f2f;
}

#scroll {
  display:flex;
  white-space:nowrap;
  font-size:50px;
  font-weight:bold;
  color:#d32f2f;
}

#scroll span {
  padding-right:100px;
}

/* Paramètres */
#settingsBtn {
  position:absolute;
  bottom:90px;
  left:20px;
  background:#d32f2f;
  color:white;
  border:none;
  padding:10px;
}

/* Menu */
#settings {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  color:white;
  padding:20px;
  overflow:auto;
}

input,select {
  padding:6px;
  margin:5px;
}

.stopItem {
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="time"></div>
<div id="lineButtons"></div>

<div id="lineContainer">
  <div id="lineBar"></div>
  <div id="stops"></div>
</div>

<div id="bottom">
  <div id="scroll">
    <span id="text1"></span>
    <span id="text2"></span>
  </div>
</div>

<button id="settingsBtn">⚙️</button>

<div id="settings">
<h2>Paramètres</h2>

<select id="lineSelect"></select><br>

<input id="lineName" placeholder="Nom ligne"><br>
<button onclick="createLine()">Créer ligne</button>
<button onclick="deleteLine()">Supprimer ligne</button>

<hr>

<input id="stopName" placeholder="Nom arrêt">
<button onclick="addStop()">Ajouter arrêt (GPS)</button>

<div id="stopList"></div>

<button onclick="closeSettings()">Fermer</button>
</div>

<script>
let lines=JSON.parse(localStorage.getItem("lines"))||[];
let currentLine=null;
let selectedLine=null;
let currentIndex=0;
let userPos=null;

/* Heure */
setInterval(()=>{
  const n=new Date();
  time.innerText=n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");
},1000);

/* GPS */
navigator.geolocation.watchPosition(p=>{
  userPos=p.coords;
  checkStop();
});

/* Boutons lignes */
function loadButtons(){
  lineButtons.innerHTML="";
  lines.forEach((l,i)=>{
    let b=document.createElement("button");
    b.innerText=l.name;
    b.onclick=()=>selectLine(i);
    lineButtons.appendChild(b);
  });
}
loadButtons();

/* Select */
function loadSelect(){
  lineSelect.innerHTML="";
  lines.forEach((l,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.innerText=l.name;
    lineSelect.appendChild(o);
  });
  lineSelect.onchange=()=>{
    selectedLine=parseInt(lineSelect.value);
    showStops();
  }
}

/* Créer ligne */
function createLine(){
  let name=lineName.value;
  if(!name)return;
  lines.push({name,stops:[]});
  save();
}

/* Supprimer ligne */
function deleteLine(){
  if(selectedLine==null)return;
  lines.splice(selectedLine,1);
  save();
}

/* Ajouter arrêt */
function addStop(){
  if(selectedLine==null)return alert("Choisis ligne");
  if(!userPos)return alert("Active GPS");

  let name=stopName.value;

  lines[selectedLine].stops.push({
    name,
    lat:userPos.latitude,
    lon:userPos.longitude
  });

  save();
}

/* Supprimer arrêt */
function removeStop(i){
  lines[selectedLine].stops.splice(i,1);
  save();
}

/* Afficher liste arrêts */
function showStops(){
  stopList.innerHTML="";
  if(selectedLine==null)return;

  lines[selectedLine].stops.forEach((s,i)=>{
    let div=document.createElement("div");
    div.className="stopItem";
    div.innerHTML=s.name+" <button onclick='removeStop("+i+")'>X</button>";
    stopList.appendChild(div);
  });
}

/* Save */
function save(){
  localStorage.setItem("lines",JSON.stringify(lines));
  loadButtons();
  loadSelect();
  showStops();
}

/* Sélection ligne */
function selectLine(i){
  currentLine=lines[i];
  currentIndex=0;
  draw();
}

/* Dessin */
function draw(){
  stops.innerHTML="";
  currentLine.stops.forEach((s,i)=>{
    let d=document.createElement("div");
    d.className="stop";
    if(i==currentIndex)d.classList.add("active");
    d.innerHTML="<div class='dot'></div><div class='stopName'>"+s.name+"</div>";
    stops.appendChild(d);
  });
}

/* Distance */
function dist(a,b){
  return Math.sqrt((a.lat-b.latitude)**2+(a.lon-b.longitude)**2);
}

/* Scroll fluide */
let x=0;
function scrollText(t){
  text1.innerText=t;
  text2.innerText=t;
  function anim(){
    x-=1;
    if(Math.abs(x)>text1.offsetWidth)x=0;
    text1.style.transform=`translateX(${x}px)`;
    text2.style.transform=`translateX(${x+text1.offsetWidth}px)`;
    requestAnimationFrame(anim);
  }
  anim();
}

/* GPS logique */
function checkStop(){
  if(!currentLine||!userPos)return;

  let s=currentLine.stops[currentIndex];
  let d=dist(s,userPos);

  if(d<0.0005){
    scrollText("ARRET : "+s.name.toUpperCase());
  }else{
    let next=currentLine.stops[currentIndex+1];
    if(next){
      scrollText("PROCHAIN ARRET : "+next.name.toUpperCase());
      if(d>0.001) currentIndex++;
      draw();
    }
  }
}

/* UI */
settingsBtn.onclick=()=>{
  settings.style.display="block";
  loadSelect();
}
function closeSettings(){
  settings.style.display="none";
}
</script>

</body>
</html>
