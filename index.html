<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiplan Yégo</title>
<style>
/* Body noir */
body {
  margin: 0;
  background: #fff;
  font-family: Arial, sans-serif;
  color: #000;
  overflow: hidden;
  position: relative;
}

/* Header rouge ligne + numéro */
#header {
  background: #fff;
  color: #d32f2f;
  padding: 10px 20px;
  font-weight: bold;
  font-size: 18px;
}

/* Flèches et points */
#lineDisplay {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin: 30px 20px 0 20px;
}

.stop {
  text-align: center;
  position: relative;
  flex: 1;
}

.dot {
  width: 14px;
  height: 14px;
  background: #000;
  border-radius: 50%;
  margin: auto;
  margin-bottom: 5px;
}

.arrow {
  width: 100%;
  height: 2px;
  background: #000;
  position: absolute;
  top: 7px;
  left: 0;
  z-index: -1;
}

/* Texte arrêt sous dot */
.stopName {
  font-size: 14px;
  transform: rotate(-45deg);
  transform-origin: bottom left;
  white-space: nowrap;
}

/* Texte bas défilant */
#bottomText {
  position: absolute;
  bottom: 20px;
  width: 100%;
  white-space: nowrap;
  overflow: hidden;
  font-size: 24px;
  font-weight: bold;
  text-align: center;
  color: #000;
}

#bottomText span {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 10s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* Boutons lignes en haut */
#lineButtons {
  position: absolute;
  top: 10px;
  left: 10px;
}

#lineButtons button {
  background: #d32f2f;
  color: #fff;
  border: none;
  margin-right: 5px;
  padding: 5px 10px;
  cursor: pointer;
  font-weight: bold;
  border-radius: 3px;
}

/* Heure en haut à droite */
#time {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 18px;
  font-weight: bold;
}

/* Bouton réglages */
#settingsBtn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  padding: 8px 12px;
  background: #d32f2f;
  color: #fff;
  border: none;
  font-size: 18px;
  cursor: pointer;
  border-radius: 5px;
}

/* Menu réglages */
#settings {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  color: #fff;
  padding: 20px;
  box-sizing: border-box;
}

#settings input {
  width: 80%;
  padding: 5px;
  margin: 5px 0;
  font-size: 16px;
}

#settings button {
  padding: 6px 10px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
  background: #d32f2f;
  border: none;
  color: #fff;
  border-radius: 3px;
}
</style>
</head>
<body>

<div id="header">001A LABENNE - ST VINCENT DE TYROSSE<br>Vers ST VINCENT DE TYROSSE - LYCEE</div>

<div id="lineButtons"></div>
<div id="time"></div>

<div id="lineDisplay"></div>

<div id="bottomText"><span id="scrollContent">Prochain arrêt : ...</span></div>

<button id="settingsBtn">⚙️</button>

<div id="settings">
  <h2>Créer une ligne</h2>
  <input id="lineName" placeholder="Nom ligne"><br>
  <input id="stopName" placeholder="Nom arrêt"><br>
  <button onclick="addStop()">Ajouter arrêt</button><br>
  <button onclick="saveLine()">Sauvegarder ligne</button>
  <button onclick="closeSettings()">Fermer</button>
</div>

<script>
let lines = JSON.parse(localStorage.getItem("lines")) || [];
let currentLine = null;
let stopsTemp = [];
let currentIndex = 0;
let userPos = null;

/* Heure */
setInterval(()=>{
  const now = new Date();
  document.getElementById("time").innerText =
    now.getHours().toString().padStart(2,"0") + ":" + 
    now.getMinutes().toString().padStart(2,"0");
},1000);

/* GPS */
navigator.geolocation.watchPosition((pos)=>{
  userPos = pos.coords;
  checkStop();
});

/* Bouton lignes */
function loadButtons() {
  const div = document.getElementById("lineButtons");
  div.innerHTML = "";
  lines.forEach((l,i)=>{
    const btn = document.createElement("button");
    btn.innerText = l.name;
    btn.onclick = ()=>selectLine(i);
    div.appendChild(btn);
  });
}
loadButtons();

/* Ajouter arrêt */
function addStop(){
  if(!userPos) return alert("Active GPS");
  const name = document.getElementById("stopName").value;
  stopsTemp.push({name, lat:userPos.latitude, lon:userPos.longitude});
  alert("Arrêt ajouté !");
}

/* Sauvegarder ligne */
function saveLine(){
  const name = document.getElementById("lineName").value;
  lines.push({name, stops:stopsTemp});
  localStorage.setItem("lines",JSON.stringify(lines));
  stopsTemp=[];
  loadButtons();
  closeSettings();
}

/* Sélection ligne */
function selectLine(i){
  currentLine = lines[i];
  currentIndex=0;
  displayLine();
}

/* Affichage ligne */
function displayLine(){
  const div = document.getElementById("lineDisplay");
  div.innerHTML="";
  if(!currentLine) return;
  currentLine.stops.forEach((s,index)=>{
    const stopDiv = document.createElement("div");
    stopDiv.className="stop";
    stopDiv.innerHTML=`<div class="dot"></div><div class="stopName">${s.name}</div>`;
    div.appendChild(stopDiv);
    if(index<currentLine.stops.length-1){
      const arrow = document.createElement("div");
      arrow.className="arrow";
      stopDiv.appendChild(arrow);
    }
  });
}

/* Distance GPS */
function distance(a,b){
  return Math.sqrt((a.lat-b.latitude)**2+(a.lon-b.longitude)**2);
}

/* Vérifier arrêt et texte bas */
function checkStop(){
  if(!currentLine||!userPos) return;
  const stop = currentLine.stops[currentIndex];
  if(!stop) return;
  const d = distance(stop,userPos);
  const scroll = document.getElementById("scrollContent");

  if(d<0.0005){
    scroll.innerText = "Arrêt : " + stop.name;
  } else {
    const next = currentLine.stops[currentIndex+1];
    if(next) scroll.innerText = "Prochain arrêt : " + next.name;
    if(d>0.001 && currentIndex<currentLine.stops.length-1) currentIndex++;
  }
}

/* Bouton réglages */
document.getElementById("settingsBtn").onclick = ()=>{
  document.getElementById("settings").style.display="block";
}
function closeSettings(){
  document.getElementById("settings").style.display="none";
}
</script>

</body>
</html>
