<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiplan Amélioré</title>

<style>
body {
  margin: 0;
  background: white;
  color: #ff6600; /* orange visible sur blanc */
  font-family: monospace;
  overflow: hidden;
}

/* Heure */
#time {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 28px;
  font-weight: bold;
}

/* Lignes en haut */
#lineButtons {
  position: absolute;
  top: 10px;
  left: 10px;
}

button {
  background: #ff6600;
  border: none;
  margin: 5px;
  padding: 10px 15px;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  border-radius: 5px;
}

/* Affichage ligne */
#display {
  text-align: center;
  margin-top: 150px;
  display: flex;
  justify-content: center;
  gap: 50px;
}

/* Arrêts */
.stop {
  text-align: center;
  position: relative;
}

.dot {
  width: 30px;
  height: 30px;
  background: #ff6600;
  border-radius: 50%;
  margin: auto;
  border: 3px solid black;
}

.stop-name {
  margin-top: 10px;
  font-size: 20px;
  font-weight: bold;
  color: black;
}

/* Flèche */
.arrow {
  width: 0; 
  height: 0; 
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 25px solid #ff6600;
  margin: auto;
  margin-bottom: 10px;
}

/* Texte bas */
#scrollText {
  position: absolute;
  bottom: 30px;
  width: 100%;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  color: #ff6600;
  white-space: nowrap;
  overflow: hidden;
}

/* Bouton réglage */
#settingsBtn {
  position: absolute;
  bottom: 10px;
  left: 10px;
  font-size: 24px;
}

/* Menu réglage */
#settings {
  display: none;
  position: absolute;
  background: white;
  color: black;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 20px;
  overflow-y: auto;
  font-size: 18px;
}

input {
  font-size: 18px;
  padding: 5px;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<div id="time"></div>

<div id="lineButtons"></div>

<div id="display"></div>

<div id="scrollText">Sélectionnez une ligne</div>

<button id="settingsBtn">⚙️</button>

<div id="settings">
  <h2>Créer / Modifier une ligne</h2>
  <input id="lineName" placeholder="Nom ligne"><br>

  <h3>Ajouter un arrêt</h3>
  <input id="stopName" placeholder="Nom arrêt">
  <input id="stopLat" placeholder="Latitude">
  <input id="stopLon" placeholder="Longitude"><br>
  <button onclick="addStop()">Ajouter cet arrêt</button><br><br>

  <button onclick="saveLine()">Sauvegarder ligne</button>
  <button onclick="closeSettings()">Fermer</button>

  <hr>
  <h3>Arrêts temporairement ajoutés</h3>
  <ul id="tempStopsList"></ul>
</div>

<script>
let lines = JSON.parse(localStorage.getItem("lines")) || [];
let currentLine = null;
let stopsTemp = [];

/* Heure */
setInterval(() => {
  let now = new Date();
  document.getElementById("time").innerText =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0");
}, 1000);

/* Ajouter arrêt */
function addStop() {
  let name = document.getElementById("stopName").value.trim();
  let lat = parseFloat(document.getElementById("stopLat").value);
  let lon = parseFloat(document.getElementById("stopLon").value);

  if (!name || isNaN(lat) || isNaN(lon)) {
    return alert("Veuillez remplir correctement tous les champs !");
  }

  stopsTemp.push({ name, lat, lon });
  updateTempList();

  document.getElementById("stopName").value = "";
  document.getElementById("stopLat").value = "";
  document.getElementById("stopLon").value = "";
}

/* Afficher la liste temporaire */
function updateTempList() {
  const ul = document.getElementById("tempStopsList");
  ul.innerHTML = "";
  stopsTemp.forEach((s,i) => {
    const li = document.createElement("li");
    li.innerText = `${s.name} (${s.lat.toFixed(5)}, ${s.lon.toFixed(5)})`;
    ul.appendChild(li);
  });
}

/* Sauvegarder ligne */
function saveLine() {
  const name = document.getElementById("lineName").value.trim();
  if (!name || stopsTemp.length === 0) {
    return alert("Nom de ligne et au moins un arrêt requis !");
  }

  lines.push({ name, stops: stopsTemp });
  localStorage.setItem("lines", JSON.stringify(lines));
  stopsTemp = [];
  updateTempList();
  document.getElementById("lineName").value = "";
  loadButtons();
  alert("Ligne sauvegardée !");
}

/* Boutons lignes */
function loadButtons() {
  const div = document.getElementById("lineButtons");
  div.innerHTML = "";
  lines.forEach((l,i) => {
    const btn = document.createElement("button");
    btn.innerText = l.name;
    btn.onclick = () => selectLine(i);
    div.appendChild(btn);
  });
}
loadButtons();

/* Sélection ligne */
let currentIndex = 0;
let userPos = null;

function selectLine(i) {
  currentLine = lines[i];
  currentIndex = 0;
  displayLine();
  updateScrollText();
}

/* Affichage ligne */
function displayLine() {
  const display = document.getElementById("display");
  display.innerHTML = "";
  if (!currentLine) return;

  currentLine.stops.forEach((s,i) => {
    const div = document.createElement("div");
    div.className = "stop";
    div.innerHTML = `
      <div class="arrow"></div>
      <div class="dot"></div>
      <div class="stop-name">${s.name}</div>
    `;
    display.appendChild(div);
  });
}

/* Texte bas */
function updateScrollText() {
  if (!currentLine) {
    document.getElementById("scrollText").innerText = "Sélectionnez une ligne";
    return;
  }
  if (!userPos) {
    document.getElementById("scrollText").innerText = "GPS non disponible";
    return;
  }

  let stop = currentLine.stops[currentIndex];
  let next = currentLine.stops[currentIndex+1];

  if (distance(stop, userPos) < 0.0005) {
    document.getElementById("scrollText").innerText = `ARRÊT : ${stop.name.toUpperCase()}`;
  } else if (next) {
    document.getElementById("scrollText").innerText = `PROCHAIN ARRÊT : ${next.name.toUpperCase()}`;
    if (distance(next, userPos) < 0.0005) currentIndex++;
  }
}

/* Distance GPS approx */
function distance(a,b) {
  return Math.sqrt((a.lat - b.latitude)**2 + (a.lon - b.longitude)**2);
}

/* GPS en temps réel */
if (navigator.geolocation) {
  navigator.geolocation.watchPosition((pos) => {
    userPos = pos.coords;
    updateScrollText();
  });
}

/* Menu réglage */
document.getElementById("settingsBtn").onclick = () => {
  document.getElementById("settings").style.display = "block";
}
function closeSettings() {
  document.getElementById("settings").style.display = "none";
}
</script>

</body>
</html>
