<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiplan Real</title>

<style>
body {margin:0;background:#fff;font-family:Arial;overflow:hidden;}

/* Heure */
#time {position:absolute;top:10px;right:20px;font-size:22px;font-weight:bold;}

/* Boutons lignes */
#lineButtons {position:absolute;top:10px;left:10px;}
#lineButtons button {background:#d32f2f;color:white;border:none;margin:3px;padding:6px 12px;}

/* Ligne */
#lineContainer {position:absolute;top:140px;width:100%;}
#lineBar {height:6px;background:#d32f2f;margin:0 40px;}
#stops {display:flex;justify-content:space-between;margin:0 40px;margin-top:-10px;}

.stop {text-align:center;}
.dot {width:18px;height:18px;background:black;border-radius:50%;margin:auto;}
.active .dot {background:#d32f2f;}
.stopName {margin-top:8px;font-size:14px;white-space:nowrap;}

/* Défilement */
#bottom {position:absolute;bottom:0;width:100%;height:80px;overflow:hidden;border-top:4px solid #d32f2f;}
#scroll {display:flex;white-space:nowrap;font-size:50px;font-weight:bold;color:#d32f2f;}
#scroll span {padding-right:100px;}

/* Bouton */
#settingsBtn {position:absolute;bottom:90px;left:20px;background:#d32f2f;color:white;border:none;padding:10px;}

/* Menu */
#settings {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  color:white;
  padding:20px;
  overflow:auto;
}

/* UI propre */
input {padding:8px;margin:5px;width:70%;}
button {padding:6px;margin:3px;}

.lineItem, .stopItem {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:8px 0;
}
</style>
</head>

<body>

<div id="time"></div>
<div id="lineButtons"></div>

<div id="lineContainer">
  <div id="lineBar"></div>
  <div id="stops"></div>
</div>

<div id="bottom">
  <div id="scroll">
    <span id="text1"></span>
    <span id="text2"></span>
  </div>
</div>

<button id="settingsBtn">⚙️</button>

<div id="settings">

<!-- PAGE LIGNES -->
<div id="pageLines">
  <h2>Lignes</h2>
  <div id="linesList"></div>

  <input id="newLineName" placeholder="Nom ligne">
  <button onclick="createLine()">➕ Créer</button>
</div>

<!-- PAGE EDIT -->
<div id="pageEdit" style="display:none">
  <h2 id="editTitle"></h2>

  <div id="stopsList"></div>

  <input id="newStopName" placeholder="Nom arrêt">
  <button onclick="addStop()">📍 Ajouter arrêt (GPS)</button>

  <br><br>
  <button onclick="deleteLine()">🗑️ Supprimer ligne</button>
  <button onclick="back()">⬅️ Retour</button>
</div>

<br>
<button onclick="closeSettings()">❌ Fermer</button>

</div>

<script>
let lines = JSON.parse(localStorage.getItem("lines")) || [];
let currentLine = null;
let currentIndex = 0;
let userPos = null;
let editingIndex = null;

/* Heure */
setInterval(()=>{
  const n=new Date();
  time.innerText=n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");
},1000);

/* GPS */
navigator.geolocation.watchPosition(p=>{
  userPos=p.coords;
  checkStop();
});

/* Boutons lignes */
function loadButtons(){
  lineButtons.innerHTML="";
  lines.forEach((l,i)=>{
    let b=document.createElement("button");
    b.innerText=l.name;
    b.onclick=()=>selectLine(i);
    lineButtons.appendChild(b);
  });
}
loadButtons();

/* Sélection ligne */
function selectLine(i){
  currentLine=lines[i];
  currentIndex=0;
  draw();
}

/* Dessin */
function draw(){
  stops.innerHTML="";
  if(!currentLine) return;

  currentLine.stops.forEach((s,i)=>{
    let d=document.createElement("div");
    d.className="stop";
    if(i==currentIndex)d.classList.add("active");
    d.innerHTML="<div class='dot'></div><div class='stopName'>"+s.name+"</div>";
    stops.appendChild(d);
  });
}

/* Distance */
function dist(a,b){
  return Math.sqrt((a.lat-b.latitude)**2+(a.lon-b.longitude)**2);
}

/* Scroll fluide */
let x=0;
function scrollText(t){
  text1.innerText=t;
  text2.innerText=t;

  function anim(){
    x-=1;
    if(Math.abs(x)>text1.offsetWidth)x=0;

    text1.style.transform=`translateX(${x}px)`;
    text2.style.transform=`translateX(${x+text1.offsetWidth}px)`;

    requestAnimationFrame(anim);
  }
  anim();
}

/* GPS logique */
function checkStop(){
  if(!currentLine||!userPos)return;

  let s=currentLine.stops[currentIndex];
  let d=dist(s,userPos);

  if(d<0.0005){
    scrollText("ARRET : "+s.name.toUpperCase());
  }else{
    let next=currentLine.stops[currentIndex+1];
    if(next){
      scrollText("PROCHAIN ARRET : "+next.name.toUpperCase());
      if(d>0.001 && currentIndex<currentLine.stops.length-1){
        currentIndex++;
        draw();
      }
    }
  }
}

/* ================= PARAMETRES ================= */

/* OUVRIR */
settingsBtn.onclick=()=>{
  settings.style.display="block";
  showLines();
}

/* PAGE LIGNES */
function showLines(){
  pageLines.style.display="block";
  pageEdit.style.display="none";

  linesList.innerHTML="";

  lines.forEach((l,i)=>{
    let div=document.createElement("div");
    div.className="lineItem";
    div.innerHTML=`
      ${l.name}
      <div>
        <button onclick="editLine(${i})">✏️</button>
        <button onclick="removeLine(${i})">🗑️</button>
      </div>
    `;
    linesList.appendChild(div);
  });
}

/* CRÉER */
function createLine(){
  let name=newLineName.value;
  if(!name)return;

  lines.push({name,stops:[]});
  saveAll();
  newLineName.value="";
}

/* SUPPRIMER */
function removeLine(i){
  lines.splice(i,1);
  saveAll();
}

/* EDITER */
function editLine(i){
  editingIndex=i;

  pageLines.style.display="none";
  pageEdit.style.display="block";

  editTitle.innerText=lines[i].name;
  showStops();
}

/* STOPS */
function showStops(){
  stopsList.innerHTML="";

  lines[editingIndex].stops.forEach((s,i)=>{
    let div=document.createElement("div");
    div.className="stopItem";
    div.innerHTML=`
      ${s.name}
      <button onclick="removeStop(${i})">🗑️</button>
    `;
    stopsList.appendChild(div);
  });
}

/* AJOUT STOP */
function addStop(){
  if(!userPos)return alert("Active GPS");

  let name=newStopName.value;
  if(!name)return;

  lines[editingIndex].stops.push({
    name,
    lat:userPos.latitude,
    lon:userPos.longitude
  });

  newStopName.value="";
  saveAll();
}

/* DELETE STOP */
function removeStop(i){
  lines[editingIndex].stops.splice(i,1);
  saveAll();
}

/* DELETE LINE */
function deleteLine(){
  lines.splice(editingIndex,1);
  editingIndex=null;
  saveAll();
  showLines();
}

/* BACK */
function back(){
  showLines();
}

/* SAVE */
function saveAll(){
  localStorage.setItem("lines",JSON.stringify(lines));
  loadButtons();

  if(editingIndex!==null){
    showStops();
  } else {
    showLines();
  }
}

/* FERMER */
function closeSettings(){
  settings.style.display="none";
}
</script>

</body>
</html>
