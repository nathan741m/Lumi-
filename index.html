<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiplan Pro Max</title>

<style>
body {
  margin: 0;
  background: #fff;
  font-family: Arial;
  overflow: hidden;
}

/* Heure */
#time {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* Boutons lignes */
#lineButtons {
  position: absolute;
  top: 10px;
  left: 10px;
}

#lineButtons button {
  background: #d32f2f;
  color: white;
  border: none;
  margin: 3px;
  padding: 6px 12px;
}

/* Ligne */
#lineDisplay {
  position: absolute;
  top: 120px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
}

/* Ligne rouge */
#lineDisplay::before {
  content: "";
  position: absolute;
  top: 9px;
  left: 20px;
  right: 20px;
  height: 4px;
  background: #d32f2f;
  z-index: 0;
}

.stop {
  text-align: center;
  position: relative;
  z-index: 1;
}

/* Point */
.dot {
  width: 18px;
  height: 18px;
  background: black;
  border-radius: 50%;
  margin: auto;
}

/* Nom arrêt */
.stopName {
  margin-top: 10px;
  font-size: 14px;
  white-space: nowrap;
}

/* Arrêt actif */
.active .dot {
  background: #d32f2f;
}

/* Défilement */
#bottomText {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 80px;
  overflow: hidden;
  border-top: 4px solid #d32f2f;
}

#scrollWrapper {
  display: flex;
  white-space: nowrap;
  font-size: 50px;
  font-weight: bold;
  color: #d32f2f;
}

#scrollWrapper span {
  padding-right: 100px;
}

/* Bouton */
#settingsBtn {
  position: absolute;
  bottom: 90px;
  left: 20px;
  padding: 10px;
  background: #d32f2f;
  color: white;
  border: none;
}

/* Menu */
#settings {
  display: none;
  position: absolute;
  background: black;
  color: white;
  width: 100%;
  height: 100%;
  padding: 20px;
}

input, select {
  padding: 5px;
  margin: 5px;
}
</style>
</head>

<body>

<div id="time"></div>
<div id="lineButtons"></div>
<div id="lineDisplay"></div>

<div id="bottomText">
  <div id="scrollWrapper">
    <span id="scrollText1"></span>
    <span id="scrollText2"></span>
  </div>
</div>

<button id="settingsBtn">⚙️</button>

<div id="settings">
  <h2>Gestion des lignes</h2>

  <select id="lineSelect"></select><br>

  <input id="lineName" placeholder="Nom ligne"><br>
  <input id="stopName" placeholder="Nom arrêt"><br>

  <button onclick="createLine()">➕ Nouvelle ligne</button>
  <button onclick="addStop()">📍 Ajouter arrêt</button>
  <button onclick="deleteLine()">🗑️ Supprimer ligne</button>

  <button onclick="closeSettings()">❌ Fermer</button>
</div>

<script>
let lines = JSON.parse(localStorage.getItem("lines")) || [];
let currentLine = null;
let selectedLineIndex = null;
let currentIndex = 0;
let userPos = null;

/* Heure */
setInterval(()=>{
  const now = new Date();
  document.getElementById("time").innerText =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0");
},1000);

/* GPS */
navigator.geolocation.watchPosition((pos)=>{
  userPos = pos.coords;
  checkStop();
});

/* Boutons lignes */
function loadButtons(){
  const div = document.getElementById("lineButtons");
  div.innerHTML="";
  lines.forEach((l,i)=>{
    const btn=document.createElement("button");
    btn.innerText=l.name;
    btn.onclick=()=>selectLine(i);
    div.appendChild(btn);
  });
}
loadButtons();

/* Select */
function loadLineSelect(){
  const select = document.getElementById("lineSelect");
  select.innerHTML="";
  lines.forEach((l,i)=>{
    const opt=document.createElement("option");
    opt.value=i;
    opt.innerText=l.name;
    select.appendChild(opt);
  });

  select.onchange=()=>{
    selectedLineIndex=parseInt(select.value);
  }
}

/* Créer ligne */
function createLine(){
  const name=document.getElementById("lineName").value;
  if(!name) return;
  lines.push({name,stops:[]});
  localStorage.setItem("lines",JSON.stringify(lines));
  loadButtons();
  loadLineSelect();
}

/* Ajouter arrêt */
function addStop(){
  if(selectedLineIndex===null) return alert("Choisis ligne");
  if(!userPos) return alert("Active GPS");

  const name=document.getElementById("stopName").value;

  lines[selectedLineIndex].stops.push({
    name:name,
    lat:userPos.latitude,
    lon:userPos.longitude
  });

  localStorage.setItem("lines",JSON.stringify(lines));
  alert("Arrêt ajouté");
}

/* Supprimer ligne */
function deleteLine(){
  if(selectedLineIndex===null) return;
  lines.splice(selectedLineIndex,1);
  localStorage.setItem("lines",JSON.stringify(lines));
  currentLine=null;
  loadButtons();
  loadLineSelect();
}

/* Sélection */
function selectLine(i){
  currentLine=lines[i];
  currentIndex=0;
  displayLine();
}

/* Affichage */
function displayLine(){
  const div=document.getElementById("lineDisplay");
  div.innerHTML="";
  currentLine.stops.forEach((s,i)=>{
    const el=document.createElement("div");
    el.className="stop";
    if(i===currentIndex) el.classList.add("active");

    el.innerHTML=`<div class="dot"></div><div class="stopName">${s.name}</div>`;
    div.appendChild(el);
  });
}

/* Distance */
function distance(a,b){
  return Math.sqrt((a.lat-b.latitude)**2+(a.lon-b.longitude)**2);
}

/* Défilement fluide */
let scrollX=0;
let speed=1;

function startScroll(text){
  const s1=document.getElementById("scrollText1");
  const s2=document.getElementById("scrollText2");

  s1.innerText=text;
  s2.innerText=text;

  function animate(){
    scrollX-=speed;
    if(Math.abs(scrollX)>s1.offsetWidth) scrollX=0;

    s1.style.transform=`translateX(${scrollX}px)`;
    s2.style.transform=`translateX(${scrollX+s1.offsetWidth}px)`;

    requestAnimationFrame(animate);
  }

  animate();
}

/* Vérification */
function checkStop(){
  if(!currentLine||!userPos) return;

  const stop=currentLine.stops[currentIndex];
  const d=distance(stop,userPos);

  if(d<0.0005){
    startScroll("ARRÊT : "+stop.name.toUpperCase());
  }else{
    const next=currentLine.stops[currentIndex+1];
    if(next){
      startScroll("PROCHAIN ARRÊT : "+next.name.toUpperCase());
      if(d>0.001 && currentIndex<currentLine.stops.length-1){
        currentIndex++;
        displayLine();
      }
    }
  }
}

/* UI */
document.getElementById("settingsBtn").onclick=()=>{
  document.getElementById("settings").style.display="block";
  loadLineSelect();
}

function closeSettings(){
  document.getElementById("settings").style.display="none";
}
</script>

</body>
</html>
